name: Deploy app

on:
  workflow_call:
    inputs:
      branch:
        required: false
        type: string
      ci_label:
        default: medium
        required: false
        type: string
      cpu_arch:
        required: false
        type: string
      deploy_command:
        required: false
        type: string
      dot_env_path:
        default: .env
        required: false
        type: string
      environment:
        required: true
        type: string
      file_path_1:
        required: false
        type: string
      file_path_2:
        required: false
        type: string
      github_hosted_runner:
        required: false
        type: boolean
      health_check_path:
        # Path appended to server_url for a post-deploy health check (e.g., /api/ping). Empty disables the check.
        required: false
        type: string
      ignore_renovate:
        required: false
        type: boolean
      failure_mention_on_discord:
        # default value is @exKAZUu
        default: <@410228643143483402>
        required: false
        type: string
      railway_project_id:
        required: false
        type: string
      railway_service_id:
        required: false
        type: string
      runs_on:
        required: false
        type: string
      server_url:
        required: false
        type: string
      target_organization:
        required: false
        type: string
      version:
        required: false
        type: string
      working_directory:
        # Deploy target directory (e.g. packages/server for a monorepo Worker). The "common/ci-setup"
        # and "deploy/ci-setup" hooks are looked up here first and in the repository root as a
        # fallback, and the deploy command runs here. Dependencies are still installed in the root.
        default: .
        required: false
        type: string
    secrets:
      DISCORD_WEBHOOK_URL:
        required: false
      DOT_ENV:
        required: false
      FILE_CONTENT_1:
        required: false
      FILE_CONTENT_2:
        required: false
      FLY_API_TOKEN:
        required: false
      FNOX_AGE_KEY:
        description: age secret key to decrypt fnox.toml secrets
        required: false
      GCP_SA_KEY_JSON:
        required: false
      GCP_SA_KEY_JSON_FOR_FIREBASE:
        required: false
      GH_TOKEN:
        required: false
      GH_PKG_READ_TOKEN:
        required: false
      RAILWAY_API_TOKEN:
        required: false
      VERDACCIO_TOKEN:
        description: auth token for the private Verdaccio registry (used to generate .npmrc)
        required: false

jobs:
  deploy:
    if: ${{ (!inputs.target_organization || github.repository_owner == inputs.target_organization) && (!inputs.ignore_renovate || (github.event.head_commit.author.username != 'renovate-bot' && github.event.head_commit.author.username != 'renovate[bot]')) }}
    runs-on: ${{ (inputs.runs_on && fromJSON(inputs.runs_on)) || ((!github.event.repository.private || inputs.github_hosted_runner) && 'ubuntu-latest') || (inputs.cpu_arch && fromJSON(format('["self-hosted", "{0}", "{1}"]', inputs.ci_label, inputs.cpu_arch))) || fromJSON(format('["self-hosted", "{0}"]', inputs.ci_label)) }}
    env:
      FORCE_COLOR: 3
      # constants
      PYTHON_VERSION: 3.13.9
      # arguments
      # Empty when the caller does not provide the secret, which keeps fnox-less consumers unaffected.
      FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}
      HAS_DISCORD_WEBHOOK_URL: ${{ !!secrets.DISCORD_WEBHOOK_URL }}
      HAS_DOT_ENV: ${{ !!secrets.DOT_ENV }}
      HAS_FLY_API_TOKEN: ${{ !!secrets.FLY_API_TOKEN }}
      HAS_GCP_SA_KEY_JSON: ${{ !!secrets.GCP_SA_KEY_JSON }}
      HAS_FILE_CONTENT_1: ${{ !!secrets.FILE_CONTENT_1 }}
      HAS_FILE_CONTENT_2: ${{ !!secrets.FILE_CONTENT_2 }}
      HAS_GCP_SA_KEY_JSON_FOR_FIREBASE: ${{ !!secrets.GCP_SA_KEY_JSON_FOR_FIREBASE }}
      HAS_RAILWAY_API_TOKEN: ${{ !!secrets.RAILWAY_API_TOKEN }}
      # Referenced by the generated .npmrc to authenticate against the private Verdaccio
      # registry when installing dependencies; empty when the caller does not provide the secret.
      VERDACCIO_TOKEN: ${{ secrets.VERDACCIO_TOKEN }}
      WB_ENV: ${{ inputs.environment }}
    steps:
      - if: ${{ runner.environment == 'self-hosted' }}
        run: if [[ ! $(docker ps) ]]; then sudo reboot; fi
      # A crashed run can leave skip-worktree bits (from the .npmrc/dotenv hide steps) that
      # survive every reset/clean and make checkout fail once the consumer deletes the committed
      # file, permanently wedging a persistent workspace — clear them before checkout.
      - name: Clear stale skip-worktree bits left by a crashed previous run
        run: |
          if [[ -d .git ]]; then
            git ls-files -v 2> /dev/null | grep '^S ' | cut -c3- | tr '\n' '\0' | xargs -0 git update-index --no-skip-worktree -- 2> /dev/null || true
            git checkout -- . 2> /dev/null || true
          fi
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.branch }}
          # WB_VERSION below comes from `git describe --always --tags`; without tags it silently
          # degrades to a bare commit sha, so a production deploy would no longer report its
          # release version (e.g. via a /version endpoint or the Discord notification).
          fetch-tags: true
      # fnox exits 0 and silently omits age-encrypted secrets when FNOX_AGE_KEY is missing or
      # wrong, so fail fast instead of deploying without secrets.
      - name: Ensure FNOX_AGE_KEY is provided when fnox.toml exists
        run: |
          if [[ -f fnox.toml && -z "$FNOX_AGE_KEY" ]]; then
            echo "::error::fnox.toml exists but the FNOX_AGE_KEY secret was not provided"
            exit 1
          fi
      # Secrets are passed via env and written with printf so that quotes or backslashes in
      # their values cannot break out of the shell command.
      - if: ${{ env.HAS_DOT_ENV == 'true' }}
        run: printf '%s\n' "$DOT_ENV" > "$DOT_ENV_PATH"
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}
          DOT_ENV_PATH: ${{ inputs.dot_env_path }}
      - if: ${{ inputs.file_path_1 && env.HAS_FILE_CONTENT_1 == 'true' }}
        run: printf '%s\n' "$FILE_CONTENT_1" > "$FILE_PATH_1"
        env:
          FILE_CONTENT_1: ${{ secrets.FILE_CONTENT_1 }}
          FILE_PATH_1: ${{ inputs.file_path_1 }}
      - if: ${{ inputs.file_path_2 && env.HAS_FILE_CONTENT_2 == 'true' }}
        run: printf '%s\n' "$FILE_CONTENT_2" > "$FILE_PATH_2"
        env:
          FILE_CONTENT_2: ${{ secrets.FILE_CONTENT_2 }}
          FILE_PATH_2: ${{ inputs.file_path_2 }}

      - name: Check version files
        id: check-ver
        run: |
          if [[ -f .tool-versions || -f mise.toml || -f .node-version || -f .python-version ]]; then
            echo "exist-any-version=1" >> $GITHUB_OUTPUT
          fi
          if [[ -f .node-version ]] || \
             ([[ -f .tool-versions ]] && grep -qE '^(node|nodejs)[[:space:]]' .tool-versions) || \
             ([[ -f mise.toml ]] && grep -qE '^[[:space:]]*(node|nodejs)[[:space:]]*=' mise.toml); then
            echo "exist-nodejs-version=1" >> $GITHUB_OUTPUT
          fi
      - name: Check gcloud is required
        id: check-gcloud
        # The deploy target may live outside packages/*, so probe it too; otherwise gcloud would not
        # be installed or authenticated for a deploy that needs it.
        run: |
          if [[ $HAS_GCP_SA_KEY_JSON == "true" ]]; then
            if [[ "$(cat package.json)" == *gcloud* || "$(cat packages/*/package.json)" == *gcloud* || \
                  "$(cat "$WORKING_DIRECTORY/package.json" 2> /dev/null)" == *gcloud* ]]; then
              echo "require-gcloud=1" >> $GITHUB_OUTPUT
            fi
          fi
        env:
          WORKING_DIRECTORY: ${{ inputs.working_directory }}
      - if: ${{ !steps.check-ver.outputs.exist-nodejs-version }}
        uses: actions/setup-node@v6.5.0
        with:
          check-latest: true
          node-version: lts/*
      - if: ${{ (steps.check-ver.outputs.exist-any-version || steps.check-gcloud.outputs.require-gcloud) && runner.environment == 'self-hosted' }}
        name: Setup isolated GPG home
        run: |
          GNUPGHOME="$(mktemp -d "$RUNNER_TEMP/gnupg.XXXXXX")"
          chmod 700 "$GNUPGHOME"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
      - if: ${{ steps.check-ver.outputs.exist-any-version || steps.check-gcloud.outputs.require-gcloud }}
        uses: jdx/mise-action@v4.2.0
        with:
          cache: ${{ toJSON(runner.environment != 'self-hosted') }}
      - if: ${{ steps.check-gcloud.outputs.require-gcloud }}
        name: Install gcloud with mise
        uses: nick-fields/retry@dd56f1ca8ca991e2385c18ab6dd36ea7f9fdb55f
        with:
          timeout_minutes: 15
          max_attempts: 3
          command: |
            if ! (([[ -f .tool-versions ]] && grep -qE '^python[[:space:]]' .tool-versions) || \
                  ([[ -f mise.toml ]] && grep -qE '^[[:space:]]*python[[:space:]]*=' mise.toml)); then
              : # Deal with incomplete python installation
              python --version || mise uninstall python@$PYTHON_VERSION
              mise use python@$PYTHON_VERSION
            fi
            if ! (([[ -f .tool-versions ]] && grep -qE '^gcloud[[:space:]]' .tool-versions) || \
                  ([[ -f mise.toml ]] && grep -qE '^[[:space:]]*gcloud[[:space:]]*=' mise.toml)); then
              mise use gcloud@latest
            fi
      - name: Show environment information
        id: env-info
        # https://stackoverflow.com/a/677212
        run: |
          echo "WB_ENV: $WB_ENV"
          echo "node: $(node -v)"
          echo "npm: $(npm -v)"
          if [[ -f bunfig.toml ]] && \
             (([[ -f .tool-versions ]] && grep -qE '^bun[[:space:]]' .tool-versions) || \
              ([[ -f mise.toml ]] && grep -qE '^[[:space:]]*bun[[:space:]]*=' mise.toml)); then
            echo "bun: $(bun -v)"
            echo "runner=bun" >> $GITHUB_OUTPUT
          else
            YARN=$(yarn -v); echo "yarn: $YARN"
            if [[ "$YARN" == "1."* ]]; then
              echo "yarn-dir=$(yarn cache dir)" >> $GITHUB_OUTPUT
              echo "skip-scripts-option=--ignore-scripts" >> $GITHUB_OUTPUT
            elif [[ "$YARN" == "2."* ]]; then
              : # Yarn 3 renamed Yarn 2's --skip-builds to --mode=skip-build.
              echo "skip-scripts-option=--skip-builds" >> $GITHUB_OUTPUT
            else
              echo "skip-scripts-option=--mode=skip-build" >> $GITHUB_OUTPUT
            fi
            echo "runner=yarn" >> $GITHUB_OUTPUT
          fi

          if PYTHON=$(python --version 2> /dev/null); then echo "python: $PYTHON"; fi
          if POETRY=$(poetry --version 2> /dev/null); then
            echo "poetry: $POETRY"
            poetry config virtualenvs.in-project true
          fi

          if gcloud -v &> /dev/null; then echo "gcloud: $(gcloud -v 2>&1 | head -n 1)"; fi

      - name: Set environment variables
        run: |
          echo "PATH=$HOME/.fly/bin:$PATH" >> $GITHUB_ENV
          WB_VERSION=$(git describe --always --tags)
          echo "WB_VERSION=$WB_VERSION" >> $GITHUB_ENV
          echo "VERSION=$WB_VERSION" >> $GITHUB_ENV
      - name: Verify environment variables
        run: |
          echo ${PATH}
          echo ${WB_VERSION}
          echo ${VERSION}

      - if: ${{ steps.env-info.outputs.yarn-dir }}
        uses: actions/cache@v6.1.0
        with:
          path: ${{ steps.env-info.outputs.yarn-dir }}
          # Don't use **/yarn.lock because it scans yarn.lock in node_modules
          # c.f. https://github.com/AllanChain/blog/issues/98
          key: ${{ runner.os }}-yarn-v1-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-v1-

      - if: ${{ env.HAS_FLY_API_TOKEN == 'true' }}
        name: Install fly
        uses: nick-fields/retry@dd56f1ca8ca991e2385c18ab6dd36ea7f9fdb55f
        with:
          timeout_minutes: 10
          max_attempts: 5
          command: curl -L https://fly.io/install.sh | FLYCTL_INSTALL=$HOME/.fly sh
      - if: ${{ steps.check-gcloud.outputs.require-gcloud && env.HAS_GCP_SA_KEY_JSON == 'true' }}
        uses: google-github-actions/auth@v3.0.0
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}
      - if: ${{ steps.check-gcloud.outputs.require-gcloud }}
        name: Configure docker to use gcloud
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet
      # ${VERDACCIO_TOKEN} is written literally; npm/bun/yarn1 expand it from the environment at
      # install time, so no plaintext token lands on disk. The file goes into the workspace, NOT
      # ~/.npmrc: a persistent ~/.npmrc would crash npm/yarn1 in any other job on the same
      # self-hosted runner that leaves VERDACCIO_TOKEN undefined. The managed lines are rewritten
      # authoritatively so stale entries never win over the current token, and the file is hidden
      # from git (a root-scoped exclude entry, or skip-worktree when the consumer tracks .npmrc)
      # so commit-and-push workflows cannot commit it. Yarn Berry ignores .npmrc; Berry consumers
      # must reference ${VERDACCIO_TOKEN} from their committed .yarnrc.yml instead.
      - if: ${{ env.VERDACCIO_TOKEN != '' }}
        name: Generate .npmrc for the private Verdaccio registry
        run: |
          : # Recover state a crashed previous run may have left behind (the always() cleanup
          : # cannot run when the runner dies): clear a stale skip-worktree bit and restore the
          : # committed content before regenerating.
          if git ls-files --error-unmatch -- .npmrc > /dev/null 2>&1; then
            git update-index --no-skip-worktree -- .npmrc 2> /dev/null || true
            git checkout -- .npmrc 2> /dev/null || true
          fi
          NPMRC_TMP=$(mktemp "$RUNNER_TEMP/npmrc.XXXXXX")
          if [[ -e .npmrc ]]; then
            grep -vE '^(@willbooster-private:registry|//verdaccio-production-e389\.up\.railway\.app/:_authToken)' .npmrc > "$NPMRC_TMP" || true
            : # Some grep implementations do not add the final newline missing from the last line.
            if [[ -s "$NPMRC_TMP" && -n "$(tail -c1 "$NPMRC_TMP")" ]]; then echo >> "$NPMRC_TMP"; fi
          fi
          echo '@willbooster-private:registry=https://verdaccio-production-e389.up.railway.app/' >> "$NPMRC_TMP"
          echo '//verdaccio-production-e389.up.railway.app/:_authToken=${VERDACCIO_TOKEN}' >> "$NPMRC_TMP"
          : # Replace .npmrc with mv instead of writing into it, so a consumer-committed symlink
          : # cannot redirect the managed lines into its target (e.g. a persistent home npmrc).
          rm -f .npmrc
          mv "$NPMRC_TMP" .npmrc
          : # Ignore rules never hide tracked files, so hide a committed .npmrc from the
          : # commit-and-push workflows with skip-worktree (same pattern as gen-pr's dotenv hide).
          if git ls-files --error-unmatch -- .npmrc > /dev/null 2>&1; then
            git update-index --skip-worktree -- .npmrc
          else
            if ! grep -qxF '/.npmrc' .git/info/exclude 2>/dev/null; then
              : # A persistent exclude file may end without a newline; a direct append would
              : # merge into its last rule and leave the generated file unhidden.
              if [[ -s .git/info/exclude && -n "$(tail -c1 .git/info/exclude)" ]]; then echo >> .git/info/exclude; fi
              echo '/.npmrc' >> .git/info/exclude
            fi
          fi
      - name: Install dependencies
        run: |
          if [[ "${{ steps.env-info.outputs.runner }}" == "bun" ]]; then
            # Because bun sometimes fails to install private repos (but, update is okay)
            bun install
          else
            : # Retry the same install first: this is the only network-bound step without a retry, and
            : # letting a transient failure reach the fallback would skip every lifecycle script.
            ${{ steps.env-info.outputs.runner }} install || ${{ steps.env-info.outputs.runner }} install || {
              : # Only a reproducible failure reaches here, which keeps postinstall failures tolerated
              : # (consumers rely on it) while resolution, auth and lockfile errors still fail the job.
              echo "::warning::Install failed twice; retrying without lifecycle scripts"
              ${{ steps.env-info.outputs.runner }} install ${{ steps.env-info.outputs.skip-scripts-option }}
            }
          fi
        env:
          GH_PKG_READ_TOKEN: ${{ secrets.GH_PKG_READ_TOKEN }}

      - if: ${{ env.HAS_GCP_SA_KEY_JSON_FOR_FIREBASE == 'true' }}
        name: Create credential file for Firebase
        # mktemp under RUNNER_TEMP keeps the path job-unique (matrix jobs share run_id) and
        # the secret goes through env + printf so its content cannot break out of the shell.
        run: |
          GOOGLE_APPLICATION_CREDENTIALS="$(mktemp "$RUNNER_TEMP/credentials.XXXXXX")"
          printf '%s\n' "$GCP_SA_KEY_JSON_FOR_FIREBASE" > "$GOOGLE_APPLICATION_CREDENTIALS"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$GOOGLE_APPLICATION_CREDENTIALS" >> "$GITHUB_ENV"
        env:
          GCP_SA_KEY_JSON_FOR_FIREBASE: ${{ secrets.GCP_SA_KEY_JSON_FOR_FIREBASE }}

      # A monorepo Worker declares its hooks in its own package.json next to its wrangler config, which
      # a root-only lookup misses; the root stays the fallback for single-package repos.
      - name: Prepare "ci-setup" hook runner
        run: |
          : # Fail fast: a path that is not a package (a typo like "packages" for "packages/server")
          : # would otherwise run the root hook and, because `yarn run` walks up to the nearest
          : # package, deploy the root package instead — succeeding while deploying the wrong thing.
          if [[ ! -f "$WORKING_DIRECTORY/package.json" ]]; then
            echo "::error::working_directory \"$WORKING_DIRECTORY\" has no package.json"
            exit 1
          fi
          echo "PKG_RUNNER=$PKG_RUNNER" >> $GITHUB_ENV
          echo "WORKING_DIRECTORY=$WORKING_DIRECTORY" >> $GITHUB_ENV
          cat << 'EOF' > "$RUNNER_TEMP/run-ci-setup.sh"
          set -euo pipefail
          dirs=("$WORKING_DIRECTORY")
          if [[ "$WORKING_DIRECTORY" != "." ]]; then dirs+=(.); fi
          for dir in "${dirs[@]}"; do
            : # Reading the parsed "scripts" object avoids both false negatives ("key" : "value" is
            : # valid JSON) and false positives (the same key in a non-"scripts" object). A BOM is
            : # stripped because Yarn accepts it while JSON.parse does not, and exit 2 keeps an
            : # unparseable manifest fatal rather than silently reading as "hook not declared".
            node -e 'const f=`${process.argv[1]}/package.json`, fs=require("fs"); if (!fs.existsSync(f)) process.exit(1); let s; try { s = JSON.parse(fs.readFileSync(f, "utf8").replace(/^\uFEFF/, "")).scripts } catch (e) { console.error(`::error::Cannot parse ${f}: ${e.message}`); process.exit(2) } process.exit(typeof s?.[process.argv[2]] === "string" ? 0 : 1)' "$dir" "$1" && rc=0 || rc=$?
            if [[ $rc -eq 0 ]]; then
              echo "Running \"$1\" in $dir"
              cd "$dir" && exec $PKG_RUNNER run "$1"
            elif [[ $rc -ne 1 ]]; then
              exit $rc
            fi
          done
          echo "Skipped \"$1\": not declared in ${dirs[*]/%//package.json}"
          EOF
        env:
          PKG_RUNNER: ${{ steps.env-info.outputs.runner }}
          WORKING_DIRECTORY: ${{ inputs.working_directory }}

      - name: Run "common/ci-setup" npm script if exists
        run: bash "$RUNNER_TEMP/run-ci-setup.sh" common/ci-setup

      - name: Deploy
        uses: nick-fields/retry@dd56f1ca8ca991e2385c18ab6dd36ea7f9fdb55f
        with:
          timeout_minutes: 60
          max_attempts: ${{ (env.HAS_FLY_API_TOKEN == 'true' || env.HAS_RAILWAY_API_TOKEN == 'true' || env.HAS_GCP_SA_KEY_JSON == 'true') && 20 || 1 }}
          command: |
            : # The retry action runs this via `bash -c` without -e, so without this a failing
            : # deploy/ci-setup or cd would fall through and deploy anyway, reporting success.
            set -euo pipefail
            : # GCP_SA_KEY_JSON may be used in deploy/ci-setup
            bash "$RUNNER_TEMP/run-ci-setup.sh" deploy/ci-setup
            cd "$WORKING_DIRECTORY"
            ${{ steps.env-info.outputs.runner }} run ${{ inputs.deploy_command || 'deploy' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY_JSON }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          # Railway CLI v4.35.0 rejects RAILWAY_PROJECT_ID without an accompanying environment selector.
          RAILWAY_ENVIRONMENT_ID: ${{ inputs.environment }}
          RAILWAY_PROJECT_ID: ${{ inputs.railway_project_id }}
          RAILWAY_SERVICE_ID: ${{ inputs.railway_service_id }}

      - if: ${{ inputs.health_check_path }}
        name: Check health of deployed server
        run: |
          url="${SERVER_URL%/}${{ inputs.health_check_path }}"
          for i in $(seq 1 30); do
            if curl --fail --silent --show-error --max-time 10 "$url" > /dev/null; then
              echo "Health check passed on attempt $i: $url"
              exit 0
            fi
            echo "Health check attempt $i/30 failed. Retrying in 5 seconds..."
            sleep 5
          done
          echo "Health check failed: $url"
          exit 1
        env:
          SERVER_URL: ${{ inputs.server_url }}

      # always(): runs even when an earlier step failed, so the failure notification below
      # always has REPO_LINK/COMMIT_LINK/WORKFLOW_URL available.
      - if: ${{ env.HAS_DISCORD_WEBHOOK_URL == 'true' && always() }}
        run: |
          echo "REPO_LINK=[${{ github.event.repository.name }}](${{ github.event.repository.html_url }})" >> $GITHUB_ENV
          : # WB_VERSION is set by a later step; fall back so early failures still get a usable link.
          VERSION_FOR_LINK="${WB_VERSION:-$(git describe --always --tags 2> /dev/null || echo '${{ github.sha }}')}"
          echo "COMMIT_LINK=[$VERSION_FOR_LINK](https://github.com/${{ github.repository }}/commits/$VERSION_FOR_LINK)" >> $GITHUB_ENV
          echo "WORKFLOW_URL=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_ENV
      # Payload contents are JSON-escaped by GitHub's toJSON expression and inserted with
      # printf, so quotes/backslashes in inputs cannot break the JSON or the shell, and the
      # failure notifier needs no provisioned tools (an early failure may precede setup-node).
      - if: ${{ env.HAS_DISCORD_WEBHOOK_URL == 'true' && failure() }}
        run: |
          printf '{"username":"WillBooster Bot","avatar_url":"https://avatars.githubusercontent.com/u/98675783","content":%s}' "$CONTENT_JSON" > "$RUNNER_TEMP/discord-payload.json"
          curl --fail-with-body -X POST -H "Content-Type: application/json" --data @"$RUNNER_TEMP/discord-payload.json" "$DISCORD_WEBHOOK_URL"
          rm -f "$RUNNER_TEMP/discord-payload.json"
        env:
          CONTENT_JSON: ${{ toJSON(format('{0} {1} の{2}環境 ({3}) を {4} に更新しようとして、[失敗]({5})しました！！！', inputs.failure_mention_on_discord, env.REPO_LINK, inputs.environment, inputs.server_url, env.COMMIT_LINK, env.WORKFLOW_URL)) }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - if: ${{ env.HAS_DISCORD_WEBHOOK_URL == 'true' && inputs.environment != 'production' }}
        run: |
          printf '{"username":"WillBooster Bot","avatar_url":"https://avatars.githubusercontent.com/u/98675783","content":%s}' "$CONTENT_JSON" > "$RUNNER_TEMP/discord-payload.json"
          curl --fail-with-body -X POST -H "Content-Type: application/json" --data @"$RUNNER_TEMP/discord-payload.json" "$DISCORD_WEBHOOK_URL"
          rm -f "$RUNNER_TEMP/discord-payload.json"
        env:
          CONTENT_JSON: ${{ toJSON(format('{0} の{1}環境 ({2}) を {3} に更新しました。', env.REPO_LINK, inputs.environment, inputs.server_url, env.COMMIT_LINK)) }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - if: ${{ env.HAS_DISCORD_WEBHOOK_URL == 'true' && inputs.environment == 'production' }}
        run: |
          CONTENT_JSON="${CONTENT_JSON//<br>/\\n}"
          printf '{"username":"WillBooster Bot","avatar_url":"https://avatars.githubusercontent.com/u/98675783","content":%s}' "$CONTENT_JSON" > "$RUNNER_TEMP/discord-payload.json"
          curl --fail-with-body -X POST -H "Content-Type: application/json" --data @"$RUNNER_TEMP/discord-payload.json" "$DISCORD_WEBHOOK_URL"
          rm -f "$RUNNER_TEMP/discord-payload.json"
        env:
          # <br> placeholders become JSON \n escapes in the run block (GitHub expression
          # literals cannot contain real newlines).
          CONTENT_JSON: ${{ toJSON(format('!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!<br>{0} の本番環境 ({1}) を {2} に更新しました。<br>!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!', env.REPO_LINK, inputs.server_url, env.COMMIT_LINK)) }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}


      - if: ${{ always() }}
        name: Delete credential files
        run: |
          if [[ -n "$GOOGLE_APPLICATION_CREDENTIALS" ]]; then rm -f -- "$GOOGLE_APPLICATION_CREDENTIALS"; fi
          : # Delete each file only when this run actually wrote it (the caller may commit
          : # files at these paths and run without the corresponding secret).
          if [[ "$HAS_DOT_ENV" == "true" ]]; then rm -f -- "$DOT_ENV_PATH"; fi
          if [[ "$HAS_FILE_CONTENT_1" == "true" && -n "$FILE_PATH_1" ]]; then rm -f -- "$FILE_PATH_1"; fi
          if [[ "$HAS_FILE_CONTENT_2" == "true" && -n "$FILE_PATH_2" ]]; then rm -f -- "$FILE_PATH_2"; fi
        env:
          DOT_ENV_PATH: ${{ inputs.dot_env_path }}
          FILE_PATH_1: ${{ inputs.file_path_1 }}
          FILE_PATH_2: ${{ inputs.file_path_2 }}
      # Revert the generate step: remove the file when this run created it, or restore the
      # committed content and clear the skip-worktree bit when the consumer tracks .npmrc; the
      # `.git` mutations otherwise outlive the job on persistent self-hosted workspaces.
      - if: ${{ always() && env.VERDACCIO_TOKEN != '' }}
        name: Clean up the generated .npmrc
        run: |
          if git ls-files --error-unmatch -- .npmrc > /dev/null 2>&1; then
            git update-index --no-skip-worktree -- .npmrc 2> /dev/null || true
            git checkout -- .npmrc 2> /dev/null || true
          else
            rm -f .npmrc
            if [[ -f .git/info/exclude ]]; then
              : # `grep -vx` exits 1 when every line matches, so tolerate it to keep `bash -e` green.
              grep -vxF -- '/.npmrc' .git/info/exclude > .git/info/exclude.tmp || true
              mv .git/info/exclude.tmp .git/info/exclude
            fi
          fi
      - if: ${{ always() }}
        name: Clean up pyc files and docker
        run: |
          : # pyc
          sudo rm -f **/*.pyc &
          : # Docker
          true $(docker rm -f $(docker ps -q) 2> /dev/null)
          true $(docker system prune -a -f --filter "until=4h")
          if [[ ! $(docker ps) ]]; then
            (which docker && sleep 5 && sudo reboot) &
          fi
