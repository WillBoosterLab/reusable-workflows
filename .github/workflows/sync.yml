name: Sync

on:
  workflow_call:
    inputs:
      sync_params_without_dest:
        required: false
        type: string
      target_organization:
        required: false
        type: string
        default: WillBooster
    secrets:
      DEST_GIT_URL:
        required: true

jobs:
  sync:
    # Make this workflow not work on other organizations for safety
    if: ${{ github.event_name != 'pull_request' && (!inputs.target_organization || github.repository_owner == inputs.target_organization) }}
    runs-on: self-hosted
    env:
      FORCE_COLOR: 3
    steps:
      # A crashed run of any install-capable workflow on this shared persistent workspace can
      # leave a tracked .npmrc modified and skip-worktree'd (see their .npmrc generation steps);
      # actions/checkout does not clear skip-worktree bits and can fail on them.
      - name: Clear stale skip-worktree bits left by a crashed previous run
        uses: WillBooster/reusable-workflows/.github/actions/clear-stale-skip-worktree@main
      # actions/checkout authenticates over HTTPS with GITHUB_TOKEN (no SSH deploy key).
      # one-way-git-sync needs the full history of the synced branch, hence fetch-depth: 0;
      # the sync destination is reached via the DEST_GIT_URL secret, not this checkout.
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest
      - name: Show environment information
        run: |
          echo "bun: $(bun -v)"
          echo "one-way-git-sync: $(bunx --bun one-way-git-sync --version)"

      # sync_params_without_dest is deliberately expanded unquoted so that it word-splits into
      # separate arguments; the secret URL goes through env so it never lands in the run: script.
      - run: |
          bunx --bun one-way-git-sync ${{ inputs.sync_params_without_dest }} \
            -d "$DEST_GIT_URL"
        env:
          DEST_GIT_URL: ${{ secrets.DEST_GIT_URL }}
          HUSKY: 0
          LEFTHOOK: 0
