name: Sync

on:
  workflow_call:
    inputs:
      sync_params_without_dest:
        required: false
        type: string
      target_organization:
        required: false
        type: string
        default: WillBooster
    secrets:
      DEST_GIT_URL:
        required: true

jobs:
  sync:
    # Make this workflow not work on other organizations for safety
    if: ${{ github.event_name != 'pull_request' && (!inputs.target_organization || github.repository_owner == inputs.target_organization) }}
    runs-on: self-hosted
    env:
      FORCE_COLOR: 3
    steps:
      # To trigger other workflows when running 'git push'
      - name: Checkout code with git
        # Branch names are attacker-controlled script-injection sources, so they reach the
        # shell only via env and are always quoted.
        run: |
          rm -rf .git
          rm -rf ./*
          rm -rf .[^.]*
          git init --initial-branch=main
          git remote add origin git@github.com:${{ github.repository }}.git
          # The refs/heads/ prefix and the -B form keep an option-like branch name (e.g. `--help`)
          # from being parsed as a git option.
          git fetch origin "refs/heads/$HEAD_REF"
          git checkout -B "$HEAD_REF" "origin/$HEAD_REF"
        env:
          HEAD_REF: ${{ github.head_ref || github.ref_name }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest
      - name: Show environment information
        run: |
          echo "bun: $(bun -v)"
          echo "one-way-git-sync: $(bunx --bun one-way-git-sync --version)"

      # sync_params_without_dest is deliberately expanded unquoted so that it word-splits into
      # separate arguments; the secret URL goes through env so it never lands in the run: script.
      - run: |
          bunx --bun one-way-git-sync ${{ inputs.sync_params_without_dest }} \
            -d "$DEST_GIT_URL"
        env:
          DEST_GIT_URL: ${{ secrets.DEST_GIT_URL }}
          HUSKY: 0
          LEFTHOOK: 0
