name: Release

on:
  workflow_call:
    inputs:
      dot_env_path:
        default: .env
        required: false
        type: string
      environment:
        required: false
        type: string
      github_hosted_runner:
        required: false
        type: boolean
      ignore_renovate:
        required: false
        type: boolean
      runs_on:
        required: false
        type: string
      skip_build:
        required: false
        type: boolean
      target_organization:
        required: false
        type: string
      trigger_deploy_workflow:
        description: 'Workflow file to trigger after a new release (e.g., deploy-production.yml). Leave empty to disable.'
        required: false
        type: string
    secrets:
      DISCORD_WEBHOOK_URL:
        required: false
      DOT_ENV:
        required: false
      FNOX_AGE_KEY:
        description: age secret key to decrypt fnox.toml secrets
        required: false
      GH_TOKEN:
        required: true
      NPM_TOKEN:
        required: false
      GH_PACKAGES_TOKEN:
        required: false
      GH_PKG_READ_TOKEN:
        required: false

jobs:
  release:
    if: ${{ (!inputs.target_organization || github.repository_owner == inputs.target_organization) && (!inputs.ignore_renovate || (github.event.head_commit.author.username != 'renovate-bot' && github.event.head_commit.author.username != 'renovate[bot]')) }}
    runs-on: ${{ (inputs.runs_on && fromJSON(inputs.runs_on)) || ((!github.event.repository.private || inputs.github_hosted_runner) && 'ubuntu-latest') || fromJSON('["self-hosted", "medium"]') }}
    env:
      FORCE_COLOR: 3
      NODE_OPTIONS: --max-old-space-size=4096
      # arguments
      # Empty when the caller does not provide the secret, which keeps fnox-less consumers unaffected.
      FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}
      HAS_DISCORD_WEBHOOK_URL: ${{ !!secrets.DISCORD_WEBHOOK_URL }}
      HAS_DOT_ENV: ${{ !!secrets.DOT_ENV }}
      # Consumers' .npmrc references NPM_TOKEN to authenticate against the private Verdaccio
      # registry when installing dependencies; empty when the caller does not provide the secret.
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      WB_ENV: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v7.0.0
      # fnox exits 0 and silently omits age-encrypted secrets when FNOX_AGE_KEY is missing or
      # wrong, so fail fast instead of releasing without secrets.
      - name: Ensure FNOX_AGE_KEY is provided when fnox.toml exists
        run: |
          if [[ -f fnox.toml && -z "$FNOX_AGE_KEY" ]]; then
            echo "::error::fnox.toml exists but the FNOX_AGE_KEY secret was not provided"
            exit 1
          fi
      # The secret is passed via env and written with printf so that quotes or backslashes in
      # its value cannot break out of the shell command.
      - if: ${{ env.HAS_DOT_ENV == 'true' }}
        run: printf '%s\n' "$DOT_ENV" > "$DOT_ENV_PATH"
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}
          DOT_ENV_PATH: ${{ inputs.dot_env_path }}
      - name: Check version files
        id: check-ver
        run: |
          if [[ -f .tool-versions || -f mise.toml || -f .node-version || -f .python-version ]]; then
            echo "exist-any-version=1" >> $GITHUB_OUTPUT
          fi
          if [[ -f .node-version ]] || \
             ([[ -f .tool-versions ]] && grep -qE '^(node|nodejs)[[:space:]]' .tool-versions) || \
             ([[ -f mise.toml ]] && grep -qE '^[[:space:]]*(node|nodejs)[[:space:]]*=' mise.toml); then
            echo "exist-nodejs-version=1" >> $GITHUB_OUTPUT
          fi
      - if: ${{ !steps.check-ver.outputs.exist-nodejs-version }}
        uses: actions/setup-node@v6.5.0
        with:
          node-version: '24.18.0'
          check-latest: true
      - if: ${{ steps.check-ver.outputs.exist-any-version && runner.environment == 'self-hosted' }}
        name: Setup isolated GPG home
        run: |
          GNUPGHOME="$(mktemp -d "$RUNNER_TEMP/gnupg.XXXXXX")"
          chmod 700 "$GNUPGHOME"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
      - if: ${{ steps.check-ver.outputs.exist-any-version }}
        uses: jdx/mise-action@v4.2.0
        with:
          cache: ${{ toJSON(runner.environment != 'self-hosted') }}
      - name: Show environment information
        id: env-info
        # https://stackoverflow.com/a/677212
        run: |
          echo "WB_ENV: $WB_ENV"
          echo "node: $(node -v)"
          echo "npm: $(npm -v)"
          if [[ -f bunfig.toml ]] && \
             (([[ -f .tool-versions ]] && grep -qE '^bun[[:space:]]' .tool-versions) || \
              ([[ -f mise.toml ]] && grep -qE '^[[:space:]]*bun[[:space:]]*=' mise.toml)); then
            echo "bun: $(bun -v)"
            echo "runner=bun" >> $GITHUB_OUTPUT
          else
            YARN=$(yarn -v); echo "yarn: $YARN"
            if [[ "$YARN" == "1."* ]]; then
              echo "yarn-dir=$(yarn cache dir)" >> $GITHUB_OUTPUT
              echo "skip-scripts-option=--ignore-scripts" >> $GITHUB_OUTPUT
            elif [[ "$YARN" == "2."* ]]; then
              : # Yarn 3 renamed Yarn 2's --skip-builds to --mode=skip-build.
              echo "skip-scripts-option=--skip-builds" >> $GITHUB_OUTPUT
            else
              echo "skip-scripts-option=--mode=skip-build" >> $GITHUB_OUTPUT
            fi
            echo "runner=yarn" >> $GITHUB_OUTPUT
          fi

      - if: ${{ steps.env-info.outputs.yarn-dir }}
        uses: actions/cache@v6.1.0
        with:
          path: ${{ steps.env-info.outputs.yarn-dir }}
          # Don't use **/yarn.lock because it scans yarn.lock in node_modules
          # c.f. https://github.com/AllanChain/blog/issues/98
          key: ${{ runner.os }}-yarn-v1-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-v1-

      - name: Install dependencies
        run: |
          if [[ "${{ steps.env-info.outputs.runner }}" == "bun" ]]; then
            # Because bun sometimes fails to install private repos (but, update is okay)
            bun install
          else
            : # Retry the same install first: this is the only network-bound step without a retry, and
            : # letting a transient failure reach the fallback would skip every lifecycle script.
            ${{ steps.env-info.outputs.runner }} install || ${{ steps.env-info.outputs.runner }} install || {
              : # Only a reproducible failure reaches here, which keeps postinstall failures tolerated
              : # (consumers rely on it) while resolution, auth and lockfile errors still fail the job.
              echo "::warning::Install failed twice; retrying without lifecycle scripts"
              ${{ steps.env-info.outputs.runner }} install ${{ steps.env-info.outputs.skip-scripts-option }}
            }
          fi
        env:
          GH_PKG_READ_TOKEN: ${{ secrets.GH_PKG_READ_TOKEN }}
      - if: ${{ !inputs.skip_build }}
        name: Build
        run: if [[ "$(cat package.json)" == *'"build":'* ]]; then ${{ steps.env-info.outputs.runner }} run build; fi
      - name: Get current latest tag
        id: pre-release-tag
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
      - name: Release
        run: |
          if [[ "$(cat package.json)" == *'"release":'* ]]; then
            ${{ steps.env-info.outputs.runner }} run release
          else
            # Because the latest semantic-release doesn't work on Bun
            node node_modules/semantic-release/bin/semantic-release.js
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }} # PAT with contents:write
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          HUSKY: 0
          LEFTHOOK: 0

      - if: ${{ env.HAS_DISCORD_WEBHOOK_URL == 'true' }}
        run: |
          curl -X POST -H "Content-Type: application/json" \
               --data "{
                  \"username\": \"WillBooster Bot\",
                  \"avatar_url\": \"https://avatars.githubusercontent.com/u/98675783\",
                  \"content\": \"[${{ github.event.repository.name }}](${{ github.event.repository.html_url }})の最新版 ([$(git describe --always --tags)](https://github.com/${{ github.repository }}/commits/$(git describe --always --tags))) をリリースしました。\"
               }" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

      - if: ${{ inputs.trigger_deploy_workflow }}
        name: Check for new release tag
        id: post-release-tag
        run: |
          git fetch --tags --force
          NEW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo '')
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          if [[ -n "$NEW_TAG" && "$NEW_TAG" != "${{ steps.pre-release-tag.outputs.tag }}" ]]; then
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi
      - if: ${{ inputs.trigger_deploy_workflow && steps.post-release-tag.outputs.created == 'true' }}
        name: Trigger deploy workflow
        run: gh workflow run ${{ inputs.trigger_deploy_workflow }} --ref ${{ steps.post-release-tag.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }} # PAT with contents:write + actions:write

      # Delete only when the DOT_ENV secret was actually written by this run: dot_env_path
      # defaults to .env, which some private repos commit.
      - if: ${{ always() && env.HAS_DOT_ENV == 'true' }}
        name: Delete credential files
        run: rm -f -- "$DOT_ENV_PATH"
        env:
          DOT_ENV_PATH: ${{ inputs.dot_env_path }}
