name: Show a given text (self-hosted)

on:
  workflow_call:
    inputs:
      cpu_arch:
        required: false
        type: string
      github_hosted_runner:
        required: false
        type: boolean
      text:
        required: true
        type: string
    outputs:
      text:
        value: ${{ jobs.echo.outputs.text }}

jobs:
  echo:
    runs-on: self-hosted
    env:
      FORCE_COLOR: 3
    outputs:
      text: ${{ steps.echo.outputs.text }}
    steps:
      - uses: actions/checkout@v7.0.0
      - id: echo
        # The text may carry attacker-controlled content (e.g. a PR title), so it reaches the
        # shell only via env and is always quoted. The delimiter syntax with a random delimiter
        # keeps multi-line values from corrupting $GITHUB_OUTPUT or injecting extra outputs.
        run: |
          delimiter="$(openssl rand -hex 16)"
          {
            echo "text<<$delimiter"
            printf '%s\n' "$TEXT"
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"
        env:
          TEXT: ${{ inputs.text }}
