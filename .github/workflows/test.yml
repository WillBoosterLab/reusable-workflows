name: Test

on:
  workflow_call:
    inputs:
      artifact_path:
        required: false
        type: string
      ci_label:
        default: medium
        required: false
        type: string
      custom_test_command:
        required: false
        type: string
      dot_env_path:
        default: .env
        required: false
        type: string
      environment:
        required: false
        type: string
      github_hosted_runner:
        required: false
        type: boolean
      paths_ignore:
        default: '["**.md", "**/docs/**"]'
        required: false
        type: string
      runs_on:
        required: false
        type: string
      target_organization:
        required: false
        type: string
      no_skip:
        required: false
        type: boolean
    secrets:
      DOT_ENV:
        required: false
      FNOX_AGE_KEY:
        description: age secret key to decrypt fnox.toml secrets
        required: false
      GH_TOKEN:
        required: true
      TAKUMI_GUARD_TOKEN:
        description: auth token for the Takumi Guard malicious-package-blocking registry proxy (used to generate .npmrc)
        required: false
      VERDACCIO_TOKEN:
        description: auth token for the private Verdaccio registry (used to generate .npmrc)
        required: false
jobs:
  pre:
    # To avoid testing on synced (mirrored) repos.
    if: ${{ !startsWith(github.head_ref, 'refs/heads/renovate/') && github.head_ref != 'refs/heads/wbfy' && (!inputs.target_organization || github.repository_owner == inputs.target_organization) }}
    runs-on: ${{ (inputs.runs_on && fromJSON(inputs.runs_on)) || ((!github.event.repository.private || inputs.github_hosted_runner) && 'ubuntu-latest') || fromJSON('["self-hosted", "medium"]') }}
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      # GitHub's Branch Protection and Rulesets require job running, so we should not skip entier jobs.
      - if: ${{ !inputs.no_skip }}
        id: skip_check
        uses: fkirc/skip-duplicate-actions@04a1aebece824b56e6ad6a401d015479cd1c50b3
        with:
          cancel_others: false
          skip_after_successful_duplicate: true
          paths_ignore: ${{ inputs.paths_ignore }}
  detect-node-version-matrix:
    needs: pre
    runs-on: ${{ (inputs.runs_on && fromJSON(inputs.runs_on)) || ((!github.event.repository.private || inputs.github_hosted_runner) && 'ubuntu-latest') || fromJSON('["self-hosted", "medium"]') }}
    outputs:
      json: ${{ steps.detect-node-version-matrix.outputs.json }}
    steps:
      - if: ${{ needs.pre.outputs.should_skip != 'true' }}
        name: Clear stale skip-worktree bits left by a crashed previous run
        uses: WillBooster/reusable-workflows/.github/actions/clear-stale-skip-worktree@main
      - if: ${{ needs.pre.outputs.should_skip != 'true' }}
        uses: actions/checkout@v7.0.0
      # We need Node.js only if no version is declared in mise-managed files and no .node-version exists.
      - if: ${{ needs.pre.outputs.should_skip != 'true' }}
        id: check-node
        run: |
          if [[ ! -f .node-version ]] && \
             ! ([[ -f .tool-versions ]] && grep -qE '^(node|nodejs)[[:space:]]' .tool-versions) && \
             ! ([[ -f mise.toml ]] && grep -qE '^[[:space:]]*(node|nodejs)[[:space:]]*=' mise.toml) && \
             (! command -v node > /dev/null || ! command -v npx > /dev/null); then
            echo "require-node-install=1" >> $GITHUB_OUTPUT
          fi
      - if: ${{ steps.check-node.outputs.require-node-install }}
        uses: actions/setup-node@v7.0.0
        with:
          check-latest: true
          node-version: lts/*
      - if: ${{ needs.pre.outputs.should_skip != 'true' }}
        id: detect-node-version-matrix
        # We must use actions/setup-node if no Node.js description exists in mise-managed files and no .node-version exists.
        run: |
          NODE_VERSIONS=""
          if [[ ! -f .node-version ]] && \
             ! ([[ -f .tool-versions ]] && grep -qE '^(node|nodejs)[[:space:]]' .tool-versions) && \
             ! ([[ -f mise.toml ]] && grep -qE '^[[:space:]]*(node|nodejs)[[:space:]]*=' mise.toml); then
            CONSTRAINT=$(node -e "console.log(((require('./package.json') || {}).engines || {}).node)")
            NODE_VERSIONS=$(npx -y semver -r "$CONSTRAINT" 14.999.999 16.999.999 18.999.999 20.999.999 22.999.999 24.999.999 | xargs | sed 's/ /","/g' | sed 's/\.999\.999//g')
          fi
          echo "json=[\"$NODE_VERSIONS\"]" >> $GITHUB_OUTPUT
  test:
    needs: [pre, detect-node-version-matrix]
    runs-on: ${{ (inputs.runs_on && fromJSON(inputs.runs_on)) || ((!github.event.repository.private || inputs.github_hosted_runner) && 'ubuntu-latest') || fromJSON(format('["self-hosted", "{0}"]', inputs.ci_label)) }}
    env:
      FORCE_COLOR: 3
      NODE_OPTIONS: --max-old-space-size=4096
      # arguments
      # FNOX_AGE_KEY is deliberately NOT job-wide: like VERDACCIO_TOKEN, it is provided
      # step-scoped only to the steps that actually run fnox (the check-fnox-secrets action and
      # the consumer script steps), so dependency lifecycle scripts run by the installs and the
      # lifecycle replay below can never read the long-lived age identity (#458).
      HAS_DOT_ENV: ${{ !!secrets.DOT_ENV }}
      # Either registry token triggers the .npmrc generation/cleanup; the hardened install
      # path (scripts-disabled credentialed install + tokenless lifecycle replay) is instead
      # keyed on the per-package-manager hardened-install output of the env-info step.
      HAS_REGISTRY_TOKEN: ${{ !!secrets.VERDACCIO_TOKEN || !!secrets.TAKUMI_GUARD_TOKEN }}
      HAS_TAKUMI_GUARD_TOKEN: ${{ !!secrets.TAKUMI_GUARD_TOKEN }}
      HAS_TEST_COMMAND: ${{ !!inputs.custom_test_command }}
      # Non-secret signal for the `if:` gates below; the VERDACCIO_TOKEN and TAKUMI_GUARD_TOKEN
      # secrets themselves are provided step-scoped only to the steps whose package-manager
      # invocations expand them from the generated .npmrc.
      HAS_VERDACCIO_TOKEN: ${{ !!secrets.VERDACCIO_TOKEN }}
      # Defined-but-empty defaults: yarn1 crashes with "Failed to replace env in config" when a
      # .npmrc references an UNDEFINED env var (an empty one is fine), so steps that are not
      # given the secrets still need the variables to exist while the generated .npmrc is on
      # disk (the Takumi Guard proxy also serves anonymously, so an empty token still installs).
      TAKUMI_GUARD_TOKEN: ''
      VERDACCIO_TOKEN: ''
      WB_ENV: ${{ inputs.environment || 'test' }}
    strategy:
      matrix:
        # c.f. https://github.community/t/reusable-workflow-with-strategy-matrix/205676
        node-version: ${{ fromJson(needs.detect-node-version-matrix.outputs.json || '[""]') }}
    steps:
      - if: ${{ runner.environment == 'self-hosted' }}
        run: if [[ ! $(docker ps) ]]; then sudo reboot; fi
      - if: ${{ needs.pre.outputs.should_skip != 'true' }}
        uses: fkirc/skip-duplicate-actions@04a1aebece824b56e6ad6a401d015479cd1c50b3
        with:
          cancel_others: true
          paths_ignore: ${{ inputs.paths_ignore }}
      - name: Clear stale skip-worktree bits left by a crashed previous run
        uses: WillBooster/reusable-workflows/.github/actions/clear-stale-skip-worktree@main
      # Fork pull-request code must never execute on persistent self-hosted runners: dependency
      # lifecycle scripts and tests would run attacker-controlled code with a persistent
      # workspace. The historical branch checkout failed for forks as a side effect; keep that
      # refusal, but explicit. Route fork PRs onto ephemeral runners via
      # github_hosted_runner/runs_on instead.
      - if: ${{ runner.environment == 'self-hosted' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        name: Reject fork pull requests on self-hosted runners
        run: |
          echo '::error::Fork pull requests are not supported on persistent self-hosted runners.'
          exit 1
      # actions/checkout authenticates over HTTPS with GITHUB_TOKEN on both hosted and
      # self-hosted runners, so self-hosted runners need no SSH deploy key; its persisted
      # credential also authenticates the push-back in the "Fix code" step below. Self-hosted
      # runners check out the head BRANCH (instead of the default pull-request merge ref) so
      # "Fix code" can commit and push onto it; fork PRs never reach this on self-hosted (see
      # the rejection above), and hosted runs keep the default (an empty ref).
      - if: ${{ needs.pre.outputs.should_skip != 'true' }}
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ (runner.environment == 'self-hosted' && (github.head_ref || github.ref_name)) || '' }}
      # The secret is passed via env and written with printf so that quotes or backslashes in
      # its value cannot break out of the shell command.
      - if: ${{ needs.pre.outputs.should_skip != 'true' && env.HAS_DOT_ENV == 'true' }}
        run: printf '%s\n' "$DOT_ENV" > "$DOT_ENV_PATH"
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}
          DOT_ENV_PATH: ${{ inputs.dot_env_path }}

      - if: ${{ needs.pre.outputs.should_skip != 'true' }}
        name: Check version files
        id: check-ver
        run: |
          if [[ -f .tool-versions || -f mise.toml || -f .node-version || -f .python-version ]]; then
            echo "exist-any-version=1" >> $GITHUB_OUTPUT
          fi
          if [[ -f .node-version ]] || \
             ([[ -f .tool-versions ]] && grep -qE '^(node|nodejs)[[:space:]]' .tool-versions) || \
             ([[ -f mise.toml ]] && grep -qE '^[[:space:]]*(node|nodejs)[[:space:]]*=' mise.toml); then
            echo "exist-nodejs-version=1" >> $GITHUB_OUTPUT
          fi
      - if: ${{ needs.pre.outputs.should_skip != 'true' && !steps.check-ver.outputs.exist-nodejs-version }}
        uses: actions/setup-node@v7.0.0
        with:
          check-latest: true
          node-version: ${{ matrix.node-version || 'lts/*' }}
      - if: ${{ needs.pre.outputs.should_skip != 'true' && steps.check-ver.outputs.exist-any-version && runner.environment == 'self-hosted' }}
        name: Setup isolated GPG home
        run: |
          GNUPGHOME="$(mktemp -d "$RUNNER_TEMP/gnupg.XXXXXX")"
          chmod 700 "$GNUPGHOME"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
      - if: ${{ needs.pre.outputs.should_skip != 'true' && steps.check-ver.outputs.exist-any-version }}
        uses: jdx/mise-action@v4.2.1
        with:
          cache: ${{ toJSON(runner.environment != 'self-hosted') }}
      # Unlike deploy's fail-fast check, this only warns: fork pull requests legitimately run
      # without secrets.
      - if: ${{ needs.pre.outputs.should_skip != 'true' }}
        name: Warn when fnox secrets cannot be resolved
        uses: WillBooster/reusable-workflows/.github/actions/check-fnox-secrets@main
        with:
          mode: warning
        env:
          # Empty when the caller does not provide the secret, which keeps fnox-less consumers unaffected.
          FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}
      - if: ${{ needs.pre.outputs.should_skip != 'true' }}
        name: Show environment information
        id: env-info
        # https://stackoverflow.com/a/677212
        run: |
          echo "concurrency-group: ${GITHUB_WORKFLOW}-${GITHUB_REF}"
          echo "WB_ENV: $WB_ENV"
          echo "node: $(node -v)"
          echo "npm: $(npm -v)"
          if [[ -f bunfig.toml ]] && \
             (([[ -f .tool-versions ]] && grep -qE '^bun[[:space:]]' .tool-versions) || \
              ([[ -f mise.toml ]] && grep -qE '^[[:space:]]*bun[[:space:]]*=' mise.toml)); then
            echo "bun: $(bun -v)"
            echo "runner=bun" >> $GITHUB_OUTPUT
            NPMRC_AWARE=1
          else
            YARN=$(yarn -v); echo "yarn: $YARN"
            if [[ "$YARN" == "1."* ]]; then
              echo "yarn-dir=$(yarn cache dir)" >> $GITHUB_OUTPUT
              echo "skip-scripts-option=--ignore-scripts" >> $GITHUB_OUTPUT
              NPMRC_AWARE=1
            elif [[ "$YARN" == "2."* ]]; then
              : # Yarn 3 renamed Yarn 2's --skip-builds to --mode=skip-build.
              echo "skip-scripts-option=--skip-builds" >> $GITHUB_OUTPUT
            else
              echo "skip-scripts-option=--mode=skip-build" >> $GITHUB_OUTPUT
            fi
            echo "runner=yarn" >> $GITHUB_OUTPUT
          fi
          : # Verdaccio credentials matter to every package manager, but the Guard token only
          : # functions where .npmrc is read (bun/yarn1): a Guard-only Yarn Berry run keeps the
          : # ordinary install path — there is no credential to protect, and the hardened
          : # path's plugin stripping would break plugin-provided resolvers during its first,
          : # replay-less install.
          if [[ "$HAS_VERDACCIO_TOKEN" == "true" || ("$HAS_TAKUMI_GUARD_TOKEN" == "true" && -n "${NPMRC_AWARE:-}") ]]; then
            echo "hardened-install=true" >> $GITHUB_OUTPUT
          fi

          if PYTHON=$(python --version 2> /dev/null); then echo "python: $PYTHON"; fi
          if POETRY=$(poetry --version 2> /dev/null); then
            echo "poetry: $POETRY"
            poetry config virtualenvs.in-project true
          fi

      - if: ${{ needs.pre.outputs.should_skip != 'true' && steps.env-info.outputs.yarn-dir }}
        uses: actions/cache@v6.1.0
        with:
          path: ${{ steps.env-info.outputs.yarn-dir }}
          # Don't use **/yarn.lock because it scans yarn.lock in node_modules
          # c.f. https://github.com/AllanChain/blog/issues/98
          key: ${{ runner.os }}-yarn-v1-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-v1-

      - if: ${{ needs.pre.outputs.should_skip != 'true' }}
        name: Inspect dependency lockfile changes
        run: |
          # PkgPreflight is a WillBooster internal service; this uploads changed lockfile contents before install.
          # Fetch the bootstrap via the authenticated Contents API (5000 req/h/token) instead of anonymous
          # raw.githubusercontent.com, whose per-IP limit rate-limits shared runners with 429s. Still pinned to
          # WORKFLOW_SHA for integrity; retry transient failures so a momentary blip doesn't fail the job.
          curl --fail --show-error --silent --retry 5 --retry-all-errors --retry-delay 2 \
            -H "authorization: Bearer ${GITHUB_TOKEN}" \
            -H "accept: application/vnd.github.raw+json" \
            "https://api.github.com/repos/${WORKFLOW_REPOSITORY}/contents/.github/scripts/create-pkg-preflight-request.cjs?ref=${WORKFLOW_SHA}" \
            --output "$RUNNER_TEMP/create-pkg-preflight-request.cjs"
          node "$RUNNER_TEMP/create-pkg-preflight-request.cjs"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          WORKFLOW_REPOSITORY: ${{ job.workflow_repository }}
          WORKFLOW_SHA: ${{ job.workflow_sha }}

      # ${VERDACCIO_TOKEN} / ${TAKUMI_GUARD_TOKEN} are written literally; npm/bun/yarn1 expand
      # them from the environment at install time, so no plaintext token lands on disk. The file
      # goes into the workspace, NOT ~/.npmrc: a persistent ~/.npmrc would crash npm/yarn1 in any
      # other job on the same self-hosted runner that leaves the variables undefined. The managed
      # lines are rewritten authoritatively so stale entries never win over the current tokens,
      # and the file is hidden from git (a root-scoped exclude entry, or skip-worktree when the
      # consumer tracks .npmrc) so commit-and-push workflows cannot commit it. Yarn Berry ignores
      # .npmrc; Berry consumers must reference ${VERDACCIO_TOKEN} from their committed
      # .yarnrc.yml instead (and Takumi Guard does not apply to Berry installs). Guard covers
      # newly RESOLVED public packages: package managers may download already-locked packages
      # from the resolved URL recorded in the lockfile (Yarn 1 always does), bypassing the proxy.
      - if: ${{ needs.pre.outputs.should_skip != 'true' && env.HAS_REGISTRY_TOKEN == 'true' }}
        name: Generate .npmrc for the private Verdaccio registry and Takumi Guard
        run: |
          : # Recover state a crashed previous run may have left behind (the always() cleanup
          : # cannot run when the runner dies): clear a stale skip-worktree bit and restore the
          : # committed content before regenerating.
          if git ls-files --error-unmatch -- .npmrc > /dev/null 2>&1; then
            git update-index --no-skip-worktree -- .npmrc 2> /dev/null || true
            git checkout -- .npmrc 2> /dev/null || true
          fi
          NPMRC_TMP=$(mktemp "$RUNNER_TEMP/npmrc.XXXXXX")
          if [[ -e .npmrc ]]; then
            : # Strip only the lines this run rewrites below (keyed on the present tokens), so a
            : # committed custom registry= line or Verdaccio config survives runs without the
            : # corresponding token ('$^' never matches, keeping every other line).
            FILTER='$^'
            if [[ "$HAS_TAKUMI_GUARD_TOKEN" == "true" ]]; then
              FILTER="$FILTER|^registry=|^//npm\.flatt\.tech/:_authToken"
            fi
            if [[ "$HAS_VERDACCIO_TOKEN" == "true" ]]; then
              FILTER="$FILTER|^@willbooster-private:registry|^//verdaccio-production-e389\.up\.railway\.app/:_authToken"
            fi
            grep -vE "$FILTER" .npmrc > "$NPMRC_TMP" || true
            : # Some grep implementations do not add the final newline missing from the last line.
            if [[ -s "$NPMRC_TMP" && -n "$(tail -c1 "$NPMRC_TMP")" ]]; then echo >> "$NPMRC_TMP"; fi
          fi
          if [[ "$HAS_TAKUMI_GUARD_TOKEN" == "true" ]]; then
            : # Route default-registry installs through the Takumi Guard proxy, which blocks
            : # known-malicious packages (https://flatt.tech/takumi/features/guard). Scoped
            : # registries (e.g. @willbooster-private) deliberately keep their own registry.
            echo 'registry=https://npm.flatt.tech/' >> "$NPMRC_TMP"
            echo '//npm.flatt.tech/:_authToken=${TAKUMI_GUARD_TOKEN}' >> "$NPMRC_TMP"
          fi
          if [[ "$HAS_VERDACCIO_TOKEN" == "true" ]]; then
            echo '@willbooster-private:registry=https://verdaccio-production-e389.up.railway.app/' >> "$NPMRC_TMP"
            echo '//verdaccio-production-e389.up.railway.app/:_authToken=${VERDACCIO_TOKEN}' >> "$NPMRC_TMP"
          fi
          : # Replace .npmrc with mv instead of writing into it, so a consumer-committed symlink
          : # cannot redirect the managed lines into its target (e.g. a persistent home npmrc).
          rm -f .npmrc
          mv "$NPMRC_TMP" .npmrc
          : # Ignore rules never hide tracked files, so hide a committed .npmrc from the
          : # commit-and-push workflows with skip-worktree (the dotenv-hide pattern shared by these workflows).
          if git ls-files --error-unmatch -- .npmrc > /dev/null 2>&1; then
            git update-index --skip-worktree -- .npmrc
          else
            if ! grep -qxF '/.npmrc' .git/info/exclude 2>/dev/null; then
              : # A persistent exclude file may end without a newline; a direct append would
              : # merge into its last rule and leave the generated file unhidden.
              if [[ -s .git/info/exclude && -n "$(tail -c1 .git/info/exclude)" ]]; then echo >> .git/info/exclude; fi
              echo '/.npmrc' >> .git/info/exclude
            fi
          fi
      # Yarn Berry loads `.yarnrc.yml` plugins during every yarn command, including the
      # credentialed install below, so a repository-committed plugin is config-driven code
      # execution that can read the step-scoped registry tokens (#453). Strip the top-level
      # `plugins:` block for the credentialed install only and restore the original file
      # right after it, so plugins still apply to the tokenless lifecycle replay. Residual
      # risk (out of scope here): the committed yarnPath release in .yarn/releases/ also
      # executes during the credentialed install.
      - if: ${{ needs.pre.outputs.should_skip != 'true' && steps.env-info.outputs.hardened-install == 'true' && steps.env-info.outputs.runner != 'bun' && steps.env-info.outputs.skip-scripts-option != '--ignore-scripts' }}
        name: Remove plugins from .yarnrc.yml for the credentialed install
        run: |
          if [[ ! -f .yarnrc.yml ]]; then exit 0; fi
          : # Recover the committed content a crashed previous run may have left sanitized
          : # (the always() restore cannot run when the runner dies, and persistent
          : # self-hosted workspaces keep the worktree between runs).
          if git ls-files --error-unmatch -- .yarnrc.yml > /dev/null 2>&1; then
            git checkout -- .yarnrc.yml 2> /dev/null || true
          fi
          YARNRC_BACKUP=$(mktemp "$RUNNER_TEMP/yarnrc.XXXXXX")
          cp .yarnrc.yml "$YARNRC_BACKUP"
          echo "YARNRC_BACKUP=$YARNRC_BACKUP" >> "$GITHUB_ENV"
          : # Drop the top-level `plugins:` block (from `plugins:` up to the next top-level
          : # key; column-0 comments do not end the block); keep every other line untouched.
          YARNRC_TMP=$(mktemp "$RUNNER_TEMP/yarnrc-sanitized.XXXXXX")
          awk '/^plugins:/ { skip = 1; next } skip && /^[^[:space:]#]/ { skip = 0 } !skip' "$YARNRC_BACKUP" > "$YARNRC_TMP"
          : # Replace with mv instead of writing into the file, so a committed symlink cannot
          : # redirect the write (the .npmrc generation pattern).
          rm -f .yarnrc.yml
          mv "$YARNRC_TMP" .yarnrc.yml
      # With a registry token (Verdaccio and/or Takumi Guard), resolve and download with
      # lifecycle scripts disabled so repository- or dependency-defined preinstall/postinstall
      # can never read the step-scoped tokens (#449); the tokenless step below replays the
      # skipped scripts.
      - if: ${{ needs.pre.outputs.should_skip != 'true' }}
        name: Install dependencies
        run: |
          if [[ "${{ steps.env-info.outputs.runner }}" == "bun" ]]; then
            if [[ "${{ steps.env-info.outputs.hardened-install }}" == "true" ]]; then
              bun install --ignore-scripts
            else
              bun install
            fi
          elif [[ "${{ steps.env-info.outputs.hardened-install }}" == "true" ]]; then
            : # No lifecycle scripts run here, so a single retry only covers transient network
            : # failures; a reproducible failure is a resolution, auth or lockfile error.
            ${{ steps.env-info.outputs.runner }} install --no-immutable ${{ steps.env-info.outputs.skip-scripts-option }} || \
              ${{ steps.env-info.outputs.runner }} install --no-immutable ${{ steps.env-info.outputs.skip-scripts-option }}
          else
            : # Retry the same install first: this is the only network-bound step without a retry, and
            : # letting a transient failure reach the fallback would skip every lifecycle script.
            ${{ steps.env-info.outputs.runner }} install --no-immutable || ${{ steps.env-info.outputs.runner }} install --no-immutable || {
              : # Only a reproducible failure reaches here, which keeps postinstall failures tolerated
              : # (consumers rely on it) while resolution, auth and lockfile errors still fail the job.
              echo "::warning::Install failed twice; retrying without lifecycle scripts"
              ${{ steps.env-info.outputs.runner }} install --no-immutable ${{ steps.env-info.outputs.skip-scripts-option }}
            }
          fi
        env:
          # Only bun/yarn1 read the Guard lines from .npmrc; Yarn Berry ignores .npmrc, so the
          # token would give its repo-controlled yarnPath executable a secret with zero
          # installation function — Berry installs get the defined-but-empty job-level value.
          TAKUMI_GUARD_TOKEN: ${{ (steps.env-info.outputs.runner == 'bun' || steps.env-info.outputs.skip-scripts-option == '--ignore-scripts') && secrets.TAKUMI_GUARD_TOKEN || '' }}
          VERDACCIO_TOKEN: ${{ secrets.VERDACCIO_TOKEN }}
          # Yarn 1 delegates execution to a repository-controlled `yarn-path` binary BEFORE
          # --ignore-scripts applies, so bypass it exactly when this install is credentialed
          # (hardened) — a tokenless install has no secret to protect and keeps its pinned
          # wrapper. Empty means "honor yarn-path" (yarn1's boolifyWithDefault treats '' as
          # unset); Berry repos always keep their committed yarnPath — it IS the Berry binary —
          # and are tokenless here anyway.
          YARN_IGNORE_PATH: ${{ (steps.env-info.outputs.hardened-install == 'true' && steps.env-info.outputs.skip-scripts-option == '--ignore-scripts') && '1' || '' }}
      # always(): the original .yarnrc.yml must come back even when the credentialed
      # install fails, both for the tokenless lifecycle replay below and so the sanitized
      # file can never be committed by later steps or outlive the job on persistent
      # self-hosted workspaces (YARNRC_BACKUP is only set when the step above sanitized).
      - if: ${{ always() && env.YARNRC_BACKUP }}
        name: Restore the original .yarnrc.yml
        run: |
          rm -f .yarnrc.yml
          mv "$YARNRC_BACKUP" .yarnrc.yml
      # Replay the lifecycle scripts the credentialed install skipped, in an environment without
      # the registry tokens (the job-level empty values keep ${VERDACCIO_TOKEN} and
      # ${TAKUMI_GUARD_TOKEN} references in .npmrc/.yarnrc.yml expanding to '' instead of
      # erroring). Every package is already in the package manager's cache from the step above,
      # so the private registry is not contacted (and Takumi Guard serves anonymously anyway).
      - if: ${{ needs.pre.outputs.should_skip != 'true' && steps.env-info.outputs.hardened-install == 'true' }}
        name: Run dependency lifecycle scripts without registry credentials
        run: |
          if [[ "${{ steps.env-info.outputs.runner }}" == "bun" ]]; then
            : # A repeated `bun install` is a no-op that does not replay skipped scripts, so
            : # force a full cache-hit re-link.
            rm -rf node_modules
            bun install || {
              : # Keep postinstall failures tolerated (consumers rely on it) while still leaving
              : # a complete node_modules behind — e.g. a repository postinstall that loads fnox
              : # secrets cannot decrypt here because FNOX_AGE_KEY is deliberately step-scoped away.
              echo "::warning::Lifecycle scripts failed; completing the install without them"
              rm -rf node_modules
              bun install --ignore-scripts
            }
          else
            if [[ "${{ steps.env-info.outputs.skip-scripts-option }}" == "--ignore-scripts" ]]; then
              : # yarn1 reports "Already up-to-date" and skips scripts unless node_modules is
              : # removed; Yarn Berry instead tracks unbuilt packages and rebuilds them itself.
              rm -rf node_modules
            fi
            ${{ steps.env-info.outputs.runner }} install --no-immutable || {
              : # Keep postinstall failures tolerated (consumers rely on it) while still leaving
              : # a complete node_modules behind.
              echo "::warning::Lifecycle scripts failed; completing the install without them"
              ${{ steps.env-info.outputs.runner }} install --no-immutable ${{ steps.env-info.outputs.skip-scripts-option }}
            }
          fi
      - if: ${{ needs.pre.outputs.should_skip != 'true' }}
        name: Run "common/ci-setup" npm script if exists
        run: if grep -q '"common/ci-setup":' package.json; then ${{ steps.env-info.outputs.runner }} run common/ci-setup; fi
        env:
          # Consumer scripts load env vars through wb/fnox (step-scoped; see the fnox check step above).
          FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}
      - if: ${{ needs.pre.outputs.should_skip != 'true' }}
        name: Run "test/ci-setup" npm script if exists
        run: |
          if grep -q '"test/ci-setup":' package.json; then
            ${{ steps.env-info.outputs.runner }} run test/ci-setup
          elif grep -q '"playwright"' package.json; then
            ${{ steps.env-info.outputs.runner }} playwright install
          fi
        env:
          # Consumer scripts load env vars through wb/fnox (step-scoped; see the fnox check step above).
          FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}
      - if: ${{ needs.pre.outputs.should_skip != 'true' }}
        name: Fix code
        run: |
          if grep -q '"gen-code":' package.json; then
            ${{ steps.env-info.outputs.runner }} run gen-code
          fi
          if grep -q '"cleanup":' package.json; then
            ${{ steps.env-info.outputs.runner }} run cleanup
          elif grep -q '"lint-fix":' package.json; then
            ${{ steps.env-info.outputs.runner }} run lint-fix
          elif grep -q '"lint":' package.json; then
            ${{ steps.env-info.outputs.runner }} run lint
          fi
          if grep -q '"build/ci":' package.json; then
            ${{ steps.env-info.outputs.runner }} run build/ci
          elif grep -q '"build":' package.json; then
            ${{ steps.env-info.outputs.runner }} run build
          fi
          : # Exclude the dotenv file when the DOT_ENV secret overwrote it: a secret written
          : # over a tracked file must never be committed and pushed by this autofix. Also
          : # unstage it in case a caller-defined script staged it (git add -A in ci-setup etc.),
          : # since the pathspec exclusion below cannot remove an existing index entry.
          excludes=()
          if [[ "$HAS_DOT_ENV" == "true" ]]; then
            excludes=(":(exclude)$DOT_ENV_PATH")
            git restore --staged -- "$DOT_ENV_PATH" 2> /dev/null || true
          fi
          if [[ -n "$(git status --porcelain -- . "${excludes[@]}")" ]]; then
            git status
            git diff -- . "${excludes[@]}"
            : # Push-back (to re-run checks against the fixed commit) only happens on
            : # self-hosted runners; on hosted runners we fail so the diff is visible.
            : # RUNNER_ENVIRONMENT is exported to every step by the runner itself (it mirrors the
            : # runner.environment context, alongside RUNNER_OS/RUNNER_TEMP), so it needs no env: entry.
            if [[ "$RUNNER_ENVIRONMENT" == "self-hosted" ]]; then
              git add -A -- . "${excludes[@]}"
              git commit -m "fix: apply changes of autofix workflow" --no-verify
              : # The push authenticates with the GITHUB_TOKEN credential persisted by
              : # actions/checkout (no SSH deploy key).
              git push origin "HEAD:refs/heads/$HEAD_REF" --no-verify
              : # A GITHUB_TOKEN push does not trigger workflows, so explicitly dispatch the
              : # consumer's test workflow against the pushed commit
              : # (https://toranoana-lab.hatenablog.com/entry/2025/08/20/100000). The consumer's
              : # test.yml must declare a workflow_dispatch trigger; tolerate its absence.
              curl --fail --show-error --silent \
                -H "authorization: Bearer $GITHUB_TOKEN" \
                -H "accept: application/vnd.github+json" \
                "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/workflows/test.yml/dispatches" \
                -d "$(node -e 'console.log(JSON.stringify({ref: process.env.HEAD_REF}))')" || \
                echo "::warning::Could not dispatch test.yml (missing workflow_dispatch trigger or actions:write permission); checks will not re-run on the pushed commit"
            else
              echo "Found changes during gen-code, cleanup, lint-fix and/or build"
              exit 1
            fi
          fi
        env:
          DOT_ENV_PATH: ${{ inputs.dot_env_path }}
          # Consumer scripts load env vars through wb/fnox (step-scoped; see the fnox check step above).
          FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
      # Typecheck must be executed after `gen-code`
      - if: ${{ needs.pre.outputs.should_skip != 'true' }}
        name: Run "typecheck" npm script if exists
        run: |
          if grep -q '"typecheck":' package.json; then
            # Deal with .next errors
            rm -Rf .next
            ${{ steps.env-info.outputs.runner }} run typecheck
          fi
        env:
          # Consumer scripts load env vars through wb/fnox (step-scoped; see the fnox check step above).
          FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}
      - if: ${{ needs.pre.outputs.should_skip != 'true' }}
        name: Test
        run: |
          if [[ "${{ env.HAS_TEST_COMMAND }}" == "true" ]]; then
            ${{ steps.env-info.outputs.runner }} run ${{ inputs.custom_test_command }}
          elif grep -q '"test/ci":' package.json; then
            ${{ steps.env-info.outputs.runner }} run test/ci
          elif grep -q '"test":' package.json; then
            ${{ steps.env-info.outputs.runner }} run test
          fi
        env:
          # Consumer scripts load env vars through wb/fnox (step-scoped; see the fnox check step above).
          FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      - if: ${{ needs.pre.outputs.should_skip != 'true' }}
        name: Run lint-staged
        run: |
          if grep -q '"lint-staged":' package.json; then
            for file in $(ls package.json packages/*/package.json); do
              sed -i -e 's/"name":/"name" :/' $file
              git add -A
            done
            ${{ steps.env-info.outputs.runner }} run lint-staged --allow-empty
          fi
        env:
          # lint-staged entries are consumer-defined commands that may load env vars through
          # wb/fnox (step-scoped; see the fnox check step above).
          FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}
      # Note: `env.GITHUB_TOKEN` here reads this step's own step-level env (the runner merges a
      # step's `env:` into the `env` context before evaluating its `if:`); consumer runs show the
      # step executing, so this gate is live, not dead.
      - if: ${{ needs.pre.outputs.should_skip != 'true' && env.GITHUB_TOKEN != '' && github.event_name == 'pull_request' }}
        name: Test release script
        run: |
          if grep -q '"semantic-release":' package.json; then
            git switch -C "$(jq -r ".branches[0]" .releaserc.json)"
            if grep -q '"release-test":' package.json; then
              ${{ steps.env-info.outputs.runner }} run release-test
            elif [[ "${{ steps.env-info.outputs.runner }}" == "bun" ]]; then
              # Run semantic-release with Node because it checks Node.js runtime requirements.
              node node_modules/semantic-release/bin/semantic-release.js --dry-run
            else
              ${{ steps.env-info.outputs.runner }} semantic-release --dry-run
            fi
          fi
        env:
          # The consumer release-test script may load env vars through wb/fnox (step-scoped;
          # see the fnox check step above).
          FNOX_AGE_KEY: ${{ secrets.FNOX_AGE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          # semantic-release's npm plugin reads the NPM_TOKEN env var for registry auth.
          NPM_TOKEN: ${{ secrets.VERDACCIO_TOKEN }}
          # The dry run's npm invocations expand these tokens from the generated .npmrc.
          TAKUMI_GUARD_TOKEN: ${{ secrets.TAKUMI_GUARD_TOKEN }}
          VERDACCIO_TOKEN: ${{ secrets.VERDACCIO_TOKEN }}
      - if: ${{ needs.pre.outputs.should_skip != 'true' && inputs.artifact_path }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-artifact
          path: ${{ inputs.artifact_path }}

      # Delete only when the DOT_ENV secret was actually written by this run: dot_env_path
      # defaults to .env, which some private repos commit.
      - if: ${{ always() && needs.pre.outputs.should_skip != 'true' && env.HAS_DOT_ENV == 'true' }}
        name: Delete credential files
        run: rm -f -- "$DOT_ENV_PATH"
        env:
          DOT_ENV_PATH: ${{ inputs.dot_env_path }}
      # Revert the generate step: remove the file when this run created it, or restore the
      # committed content and clear the skip-worktree bit when the consumer tracks .npmrc; the
      # `.git` mutations otherwise outlive the job on persistent self-hosted workspaces.
      - if: ${{ always() && needs.pre.outputs.should_skip != 'true' && env.HAS_REGISTRY_TOKEN == 'true' }}
        name: Clean up the generated .npmrc
        run: |
          if git ls-files --error-unmatch -- .npmrc > /dev/null 2>&1; then
            git update-index --no-skip-worktree -- .npmrc 2> /dev/null || true
            git checkout -- .npmrc 2> /dev/null || true
          else
            rm -f .npmrc
            if [[ -f .git/info/exclude ]]; then
              : # `grep -vx` exits 1 when every line matches, so tolerate it to keep `bash -e` green.
              grep -vxF -- '/.npmrc' .git/info/exclude > .git/info/exclude.tmp || true
              mv .git/info/exclude.tmp .git/info/exclude
            fi
          fi
      - if: ${{ always() }}
        name: Clean up pyc files, docker and ports
        run: |
          : # pyc
          sudo rm -f **/*.pyc &
          : # Docker
          true $(docker rm -f $(docker ps -q) 2> /dev/null)
          true $(docker system prune -a -f --filter "until=4h")
          if [[ ! $(docker ps) ]]; then
            (which docker && sleep 5 && sudo reboot) &
          fi
          : # port
          npx --yes kill-port@latest 3000 > /dev/null &
  # A run started by the push-back's workflow_dispatch does not attach to pull-request checks,
  # so surface the aggregate result as a commit status on the tested commit
  # (https://toranoana-lab.hatenablog.com/entry/2025/08/20/100000). This is a separate
  # non-matrix job on purpose: per-leg statuses would share one (sha, context) key, letting a
  # later successful leg overwrite an earlier failure, and needs+always() still reports when a
  # prerequisite job fails (a skipped test job would otherwise leave no status at all).
  # Requires the caller to grant statuses:write; tolerate its absence.
  report-status:
    needs: [pre, detect-node-version-matrix, test]
    # `needs.pre.result != 'skipped'` keeps a failing `pre` reportable while an intentionally
    # disabled run (e.g. a target_organization mismatch skips `pre` entirely) posts no status.
    if: ${{ always() && github.event_name == 'workflow_dispatch' && needs.pre.result != 'skipped' && needs.pre.outputs.should_skip != 'true' }}
    runs-on: ${{ (inputs.runs_on && fromJSON(inputs.runs_on)) || ((!github.event.repository.private || inputs.github_hosted_runner) && 'ubuntu-latest') || fromJSON('["self-hosted", "medium"]') }}
    steps:
      - name: Report commit status
        run: |
          STATE=failure
          if [[ "$TEST_RESULT" == "success" ]]; then STATE=success; fi
          : # The JSON is hand-built (this job installs no tools), so escape the
          : # consumer-controlled workflow name; the other values are shell-safe constants.
          CONTEXT=$(printf '%s' "$GITHUB_WORKFLOW / test (workflow_dispatch)" | sed -e 's/\\/\\\\/g' -e 's/"/\\"/g')
          curl --fail --show-error --silent \
            -H "authorization: Bearer $GITHUB_TOKEN" \
            -H "accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "{\"state\":\"$STATE\",\"target_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\",\"context\":\"$CONTEXT\",\"description\":\"$STATE\"}" || \
            echo "::warning::Could not report the commit status (missing statuses:write permission)"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Aggregated across every matrix leg: success only when all legs succeeded.
          TEST_RESULT: ${{ needs.test.result }}
