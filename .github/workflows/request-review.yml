name: Request review

on:
  workflow_call:
    inputs:
      reviewers:
        required: true
        type: string
      target_organization:
        required: false
        type: string

jobs:
  request-review:
    if: ${{ github.event.label.name == 'review requested' && (!inputs.target_organization || github.repository_owner == inputs.target_organization) }}
    runs-on: ${{ (!github.event.repository.private && 'ubuntu-latest') || fromJSON('["self-hosted", "medium"]') }}
    env:
      FORCE_COLOR: 3
    steps:
      # The payload content is JSON-escaped by GitHub's toJSON expression and inserted with
      # printf, so quotes/backslashes in the reviewers input cannot break the JSON or the shell.
      - run: |
          printf '{"body":%s}' "$BODY_JSON" > "$RUNNER_TEMP/comment-payload.json"
          curl --fail-with-body -H "Content-Type: application/json" \
               -H "Authorization: token $GITHUB_TOKEN" \
               -d @"$RUNNER_TEMP/comment-payload.json" \
               "https://api.github.com/repos/$REPOSITORY/issues/$PR_NUMBER/comments"
          rm -f "$RUNNER_TEMP/comment-payload.json"
        env:
          BODY_JSON: ${{ toJSON(format('{0} Please review this PR! :rocket:', inputs.reviewers)) }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
