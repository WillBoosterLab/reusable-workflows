name: Check fnox secrets
description: >-
  Validate that the repository's fnox secrets are resolvable with the provided FNOX_AGE_KEY.
  fnox exits 0 and silently omits unresolvable secrets by default, and a mere key-presence check
  cannot tell a wrong key from a config needing no key at all (plaintext defaults), so this runs a
  strict-mode resolution once mise installed fnox (--all includes env="exec"/env=false secrets;
  --no-daemon defeats a stale daemon cache). WB_ENV selects the profile to check and must be
  defined and name a declared profile (or the base "development") whenever a repository-scoped
  fnox config exists — fnox silently falls back to the base secrets for an undefined profile,
  which would validate (and later export) development values for a production job.
inputs:
  mode:
    description: '"error" fails the job on unresolvable secrets; "warning" only annotates the run.'
    default: error
  working_directory:
    description: >-
      Additional directory whose effective fnox configuration must also resolve (e.g. the deploy
      script's working directory; fnox resolves configs hierarchically through ancestors).
    default: ''
runs:
  using: composite
  steps:
    - name: Ensure fnox secrets are resolvable
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        WORKING_DIRECTORY: ${{ inputs.working_directory }}
      run: |
        FNOX_ARGS=(--all --format json --no-daemon --if-missing error)
        if [[ -n "$WB_ENV" ]]; then FNOX_ARGS+=(--profile "$WB_ENV"); fi
        # Canonicalize: fnox prints physically resolved paths while $PWD may contain symlinks
        # (e.g. macOS /var -> /private/var), which would break the repository-scope filter below.
        REPO_ROOT="$(pwd -P)"
        # An empty config dir masks GLOBAL fnox configuration (e.g. $XDG_CONFIG_HOME/fnox/config.toml)
        # during profile discovery: a global [profiles.<name>] must not vouch for the repository.
        EMPTY_FNOX_CONFIG_DIR="$(mktemp -d)"
        trap 'rm -rf "$EMPTY_FNOX_CONFIG_DIR"' EXIT
        # Exit codes: 0 = passed or nothing to check, 3 = WB_ENV undefined, 4 = WB_ENV names no
        # declared profile, 5 = fnox configuration unreadable, 6 = secret resolution failure,
        # 7 = the directory itself cannot be entered.
        run_check() (
          cd "$1" || exit 7
          check_root="$(pwd -P)"
          config_files="$(FNOX_NON_INTERACTIVE=true fnox config-files)" || exit 5
          # `fnox config-files` also lists GLOBAL configs, which exist on persistent self-hosted
          # runners even for fnox-less repositories; only a repository-scoped config may subject
          # the repository to these checks.
          repo_base_configs="$(grep -F "$REPO_ROOT/" <<< "$config_files" || true)"
          if [[ -z "$repo_base_configs" ]]; then
            # Profile-specific configs (fnox.<profile>.toml) are NOT listed by a bare
            # `fnox config-files` (verified with fnox 1.30.0: a repository containing only
            # fnox.production.toml prints nothing), so walk the directory chain up to the
            # repository root for them before deciding there is nothing to check.
            has_profile_config=0
            dir="$check_root"
            while :; do
              if compgen -G "$dir/fnox.*.toml" > /dev/null || compgen -G "$dir/.fnox.*.toml" > /dev/null; then
                has_profile_config=1
                break
              fi
              [[ "$dir" == "$REPO_ROOT" || "$dir" == '/' ]] && break
              dir="$(dirname "$dir")"
            done
            [[ "$has_profile_config" -eq 1 ]] || exit 0
          fi
          [[ -n "$WB_ENV" ]] || exit 3
          # fnox silently falls back to the base secrets when the requested profile is not
          # declared (verified with fnox 1.30.0: `fnox export --profile production` exits 0 with
          # base values), so a typoed or missing profile would validate development secrets for a
          # production job. The base carries the development values per the org standard, so
          # "development" itself needs no declared profile. A declared profile is an inline
          # [profiles.<name>] table of a REPOSITORY base config, or a repository-scoped
          # profile-specific file (fnox.<name>.toml), which `fnox profiles` does not list.
          if [[ "$WB_ENV" != 'development' ]]; then
            declared_profiles=''
            # Query inline profiles per repository config via `--config <file>`: a bare
            # `fnox profiles` also aggregates ancestor and global configs, either of which could
            # vouch for a profile the repository never declared (verified with fnox 1.30.0).
            while IFS= read -r base_config; do
              [[ -n "$base_config" ]] || continue
              file_profiles="$(FNOX_CONFIG_DIR="$EMPTY_FNOX_CONFIG_DIR" FNOX_NON_INTERACTIVE=true fnox profiles --config "$base_config")" || exit 5
              declared_profiles+="$file_profiles"$'\n'
            done <<< "$repo_base_configs"
            profile_config_files="$(FNOX_CONFIG_DIR="$EMPTY_FNOX_CONFIG_DIR" FNOX_NON_INTERACTIVE=true fnox config-files --profile "$WB_ENV")" || exit 5
            # Profile rows are indented as `  <name> (N secrets)`; strip exactly that decoration
            # (a name may contain whitespace, so `awk '{ print $1 }'` would truncate it) — the
            # header and fnox's synthesized `default` row are not declarations. Both supported
            # profile-file basenames count (fnox.<name>.toml and the hidden .fnox.<name>.toml),
            # compared with literal shell equality so regex metacharacters in a name cannot
            # break the match.
            profile_declared=0
            if sed -E 's/^  //; s/ \([0-9]+ secrets\)$//' <<< "$declared_profiles" | grep -vxF default | grep -qxF -- "$WB_ENV"; then
              profile_declared=1
            else
              while IFS= read -r profile_config_file; do
                case "$profile_config_file" in "$REPO_ROOT"/*) ;; *) continue ;; esac
                base_name="${profile_config_file##*/}"
                if [[ "$base_name" == "fnox.$WB_ENV.toml" || "$base_name" == ".fnox.$WB_ENV.toml" ]]; then
                  profile_declared=1
                  break
                fi
              done <<< "$profile_config_files"
            fi
            [[ "$profile_declared" -eq 1 ]] || exit 4
          fi
          if ! export_error="$(FNOX_NON_INTERACTIVE=true fnox export "${FNOX_ARGS[@]}" 2>&1 > /dev/null)"; then
            printf '%s\n' "$export_error" >&2
            # fnox classifies its own errors: a configuration problem (fnox::config::*, e.g. a
            # malformed profile-specific file that only export parses) must not be blamed on the
            # age key.
            if grep -qF 'fnox::config' <<< "$export_error"; then exit 5; fi
            exit 6
          fi
        )
        report() {
          # $2: consequence sentence appended only in warning mode, specific to the failed check.
          if [[ "$MODE" == 'warning' ]]; then
            echo "::warning::$1${2:+; $2}"
          else
            echo "::error::$1"
            exit 1
          fi
        }
        check_dir() {
          # Capture the status through `|| status=$?`: this step runs under `bash -eo pipefail`,
          # so a bare failing `run_check` would terminate the step before any reporting —
          # breaking exactly the warning-mode callers that must tolerate and annotate failures.
          local status=0
          run_check "$1" || status=$?
          case "$status" in
            0) ;;
            3)
              report "WB_ENV is not defined but a fnox configuration exists$2; the calling workflow must export it (e.g. via the \"environment\" input) so the matching fnox profile is checked" \
                'this run did not validate the profile-specific secrets'
              ;;
            4)
              report "WB_ENV \"$WB_ENV\" does not name a profile declared in the repository fnox configuration$2; fnox would silently fall back to the base (development) secrets" \
                'this run did not validate the profile-specific secrets'
              ;;
            5)
              report "the fnox configuration$2 cannot be read or parsed; fix the fnox config files — this is not an FNOX_AGE_KEY problem" \
                'this run did not validate the fnox secrets'
              ;;
            7)
              report "the directory$2 does not exist or cannot be entered; fix the working_directory input" \
                'this run did not validate the fnox secrets'
              ;;
            *)
              report "fnox secrets$2 cannot be resolved; check the FNOX_AGE_KEY secret" \
                'unresolvable age-encrypted values are silently omitted in this run'
              ;;
          esac
        }
        # `command -v` alone is fooled by mise SHIMS on persistent self-hosted runners: a global
        # fnox shim exists even for repos that do not pin fnox, and errors with "No version is
        # set for shim" — which must mean "no fnox here", not a failed check.
        if command -v fnox > /dev/null && fnox --version > /dev/null 2>&1; then
          check_dir . ''
          if [[ -n "$WORKING_DIRECTORY" && "$WORKING_DIRECTORY" != '.' ]]; then
            check_dir "$WORKING_DIRECTORY" " for working_directory \"$WORKING_DIRECTORY\""
          fi
        fi
